# Cursos de graduação presencial da UESPI (regime regular) por campus e centro.
# Fonte oficial: https://uespi.br/graduacao-inicio/ (Quadro 01).
# Em Teresina (Campus Poeta Torquato Neto) cada curso pertence a um centro
# específico (CCECA, CCHL, CCN, CCS, CCSA, CTU, CCA). Nos demais campi a oferta
# é feita pelo CIES (Centro Integrado de Ensino Superior) do campus.
# Cada curso traz seu grau: Bacharelado, Licenciatura, Tecnologia ou "Não informado"
# (cursos que aparecem sem rótulo na página oficial).

fonte: https://uespi.br/graduacao-inicio/

campi:
  - campus: Campus Poeta Torquato Neto
    cidade: Teresina
    centros:
      - sigla: CCECA
        nome: Centro de Ciências da Educação, Comunicação e Artes
        cursos:
          - { nome: Comunicação Social, grau: Bacharelado }
          - { nome: Pedagogia, grau: Licenciatura }
      - sigla: CCHL
        nome: Centro de Ciências Humanas e Letras
        cursos:
          - { nome: Geografia, grau: Licenciatura }
          - { nome: História, grau: Licenciatura }
          - { nome: Letras Português, grau: Licenciatura }
          - { nome: Letras Espanhol, grau: Licenciatura }
          - { nome: Letras Inglês, grau: Licenciatura }
          - { nome: Ciências Sociais, grau: Licenciatura }
      - sigla: CCN
        nome: Centro de Ciências da Natureza
        cursos:
          - { nome: Ciências Biológicas, grau: Licenciatura }
          - { nome: Ciências Biológicas, grau: Bacharelado }
          - { nome: Física, grau: Licenciatura }
          - { nome: Matemática, grau: Licenciatura }
          - { nome: Química, grau: Licenciatura }
      - sigla: CCS
