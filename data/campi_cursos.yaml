# Centros/núcleos que existem em vários campi — só resolvem com a cidade na pergunta.
# CIES = Centro Integrado de Ensino Superior (tabelas de oferta da UESPI).
centros_por_cidade:
  - siglas:
      - cies
      - centro integrado de ensino superior
    campi:
      - Teresina # Campus Clóvis Moura
      - Floriano
      - Parnaíba
      - Campo Maior

